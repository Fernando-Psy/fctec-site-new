    <style>
      /* Critical CSS - Above the Fold (Header + Hero) */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {

        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Font loading otimizado */
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: local('Inter');
      }
      .header-wrapper {
        position: relative;
        z-index: 1000;
      }
      .custom-navbar {
        background: rgba(255, 255, 255, 0.95) !important;
        backdrop-filter: blur(12px);
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
        padding: 1rem 0 !important;
        border-bottom: 1px solid var(--slate-200);
        position: sticky;
        top: 0;
      }
      .brand-container {
        text-decoration: none;
      }
      .logo-img {
        height: 40px;
        width: auto;
        max-height: 40px;
        object-fit: contain;
        display: block;
      }
      .hero-section {
        padding: 5rem 2rem 4rem;
        background: linear-gradient(135deg, #fff 0%, #f8fafc 50%, #f1f5f9 100%);
        position: relative;
        overflow: hidden;
      }
      .container {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 1rem;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Otimizações Mobile-First */
      @media (max-width: 767px) {
        body {
          font-size: 16px; /* Prevenir zoom automático no iOS */
        }

        .hero-section {
          padding: 3rem 1rem 2rem;
        }

        /* Reduzir animações em mobile para melhorar performance */
        *,
        *::before,
        *::after {
          animation-duration: 0.15s !important;
          transition-duration: 0.15s !important;
        }

        .hero-image-container {
          border-radius: 12px;
        }
      }

      /* Prevenir layout shift */
      img,
      picture {
        max-width: 100%;
        height: auto;
      }

      /* Reservar espaço para imagem Hero */
      .hero-image-container {
        aspect-ratio: 4/3;
        width: 100%;
        position: relative;
        overflow: hidden;
        background: linear-gradient(135deg, #f0f2f5 0%, #e2e8f0 100%);
        border-radius: 16px;
      }

      .hero-image-container img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Otimizar botões do Hero */
      button {
        cursor: pointer;
        border: none;
        font-family: inherit;
      }

      /* Prevenir FOUC (Flash of Unstyled Content) */
      #root {
        min-height: 100vh;
      }

        border-radius: 50%;

    <!-- Script inline para melhorar carregamento de recursos -->
    <script>
      // Detectar conexão lenta e ajustar estratégia de carregamento
      (function () {
        try {
          const connection =
            navigator.connection ||
            navigator.mozConnection ||
            navigator.webkitConnection;
          const slowConnection =
            connection &&
            (connection.effectiveType === 'slow-2g' ||
              connection.effectiveType === '2g' ||
              connection.effectiveType === '3g');
          const saveData = connection && connection.saveData;

          // Armazenar informação de conexão para uso posterior
          window.__connectionSlow = slowConnection || saveData || false;
          window.__saveData = saveData || false;

          // Em conexões lentas ou Save Data ativado, ajustar comportamento
          if (window.__connectionSlow) {
            // Sinalizar para o app reduzir a qualidade de imagens
            document.documentElement.classList.add('slow-connection');
          }
        } catch (e) {
          // Fallback silencioso se a API não estiver disponível
          window.__connectionSlow = false;
          window.__saveData = false;
        }

        // Prevenir scroll jank em iOS
        if (/iPad|iPhone|iPod/.test(navigator.userAgent)) {
          document.addEventListener('touchstart', function () {}, {
            passive: true,
          });
        }
      })();
    </script>
